name: Wheels

# The signal-notify package: a pure-Python sdist + py3-none-any wheel that
# works on every platform (x86 / aarch64 / armv7 alike). No Rust is built
# here — the rust/ crates are dev-only differential-test oracles, compiled
# on demand by the Differential workflow, never shipped.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  package:
    name: signal-notify sdist + py3-none-any wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build
      - name: Smoke-test the wheel
        run: |
          pip install dist/*.whl
          signal-notify --version
          python -c "from signalnotify import send_message, receive, listen"
      - uses: actions/upload-artifact@v4
        with:
          name: signal-notify-dist
          path: dist

  # PyPI publishing is deliberately NOT wired up yet. Once a trusted
  # publisher is registered on PyPI for 'signal-notify', add a job here
  # (gated on the tag) with `permissions: id-token: write` that downloads
  # the signal-notify-dist artifact and runs pypa/gh-action-pypi-publish.
