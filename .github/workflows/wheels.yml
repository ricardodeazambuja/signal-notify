name: Wheels

# 1) The signal-notify package itself: a pure-Python sdist + py3-none-any
#    wheel (works on every platform, x86/aarch64/armv7 alike).
# 2) Prebuilt abi3 wheels for the two post-quantum Rust bindings, so devs
#    running the differential tests don't need a Rust toolchain. One wheel
#    per platform covers CPython >= 3.9 (abi3-py39). --locked keeps the
#    reproducibility contract from rust/*/PROVENANCE.md: a drifted
#    Cargo.lock fails the build.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  package:
    name: signal-notify sdist + py3-none-any wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build
      - name: Smoke-test the wheel
        run: |
          pip install dist/*.whl
          signal-notify --version
          python -c "from signalnotify import send_message, receive, listen"
      - uses: actions/upload-artifact@v4
        with:
          name: signal-notify-dist
          path: dist

  linux:
    name: ${{ matrix.crate }} linux-${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: [kyber1024_py, spqr_py]
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: rust/${{ matrix.crate }}
          target: ${{ matrix.target }}
          # 2_28 (AlmaLinux 8), NOT auto: auto picks manylinux2014 (CentOS 7)
          # for x86_64, whose yum protoc is protobuf 2.x and cannot parse the
          # proto3 files spqr's build.rs compiles. These wheels are dev-only
          # oracles, so the higher glibc floor is fine.
          manylinux: 2_28
          # spqr's build.rs needs protoc (via prost-build); the manylinux
          # container doesn't ship it. manylinux images are yum-based
          # (CentOS/AlmaLinux); apt-get is a fallback for other base images.
          before-script-linux: |
            if command -v yum >/dev/null 2>&1; then
              yum install -y protobuf-compiler
            else
              apt-get update && apt-get install -y protobuf-compiler
            fi
          args: --release --locked --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.crate }}-linux-${{ matrix.target }}
          path: rust/${{ matrix.crate }}/dist

  macos:
    name: ${{ matrix.crate }} macos-arm64
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        crate: [kyber1024_py, spqr_py]
    steps:
      - uses: actions/checkout@v4
      # spqr's build.rs needs protoc (via prost-build); the macos runner
      # doesn't ship it.
      - name: Install protoc
        run: brew install protobuf
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: rust/${{ matrix.crate }}
          args: --release --locked --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.crate }}-macos-arm64
          path: rust/${{ matrix.crate }}/dist

  # PyPI publishing is deliberately NOT wired up yet: the package names
  # (kyber1024_py / spqr_py) are unregistered and may need namespacing
  # (e.g. signal-notify-kyber1024). Once names are settled, add a job here
  # gated on the tag that downloads the artifacts and runs
  # `maturin upload` with a trusted-publisher or MATURIN_PYPI_TOKEN.
