name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Primary job: the package is 100% pure Python. A clean checkout must test
  # green with nothing but pip — no Rust toolchain, no protoc, no cargo. The
  # Rust-oracle differential tests skip themselves cleanly here.
  test:
    name: pytest pure (py${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.9", "3.13"]
        include:
          # aarch64 smoke test: proves the pip-only install works on the
          # ARM boards we target (Jetson / 64-bit Raspberry Pi class).
          - os: ubuntu-24.04-arm
            python-version: "3.13"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (pure Python, no Rust)
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e '.[test]'

      - name: Run tests
        run: .venv/bin/python -m pytest -q

  # The differential-vs-Rust-oracle job lives in differential.yml: it only
  # runs when the pure crypto (or rust/) actually changes, or on manual
  # dispatch — no Rust is compiled on ordinary pushes.
