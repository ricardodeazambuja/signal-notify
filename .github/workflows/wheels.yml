name: Wheels

# The signal-notify package: a pure-Python sdist + py3-none-any wheel that
# works on every platform (x86 / aarch64 / armv7 alike). No Rust is built
# here — the rust/ crates are dev-only differential-test oracles, compiled
# on demand by the Differential workflow, never shipped.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to PyPI"
        type: boolean
        default: false

jobs:
  package:
    name: signal-notify sdist + py3-none-any wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build
      - name: Smoke-test the wheel
        run: |
          pip install dist/*.whl
          signal-notify --version
          python -c "from signalnotify import send_message, receive, listen"
      - uses: actions/upload-artifact@v4
        with:
          name: signal-notify-dist
          path: dist

  # Publishes via PyPI Trusted Publishing (OIDC) — no token stored anywhere.
  # The trusted publisher on PyPI is registered for this repo + wheels.yml +
  # environment 'pypi'. Runs on version tags, or on manual dispatch only when
  # the publish input is explicitly checked.
  publish:
    name: publish to PyPI
    needs: package
    if: github.event_name == 'push' || inputs.publish
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/signal-notify/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: signal-notify-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
